# Service Account — identity for the pod
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jira-mcp-sa
  namespace: mcp-apps
automountServiceAccountToken: false   # don't auto mount — we don't need k8s API access
---
# Role — what this identity is allowed to do
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: jira-mcp-role
  namespace: mcp-apps
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]     # read-only access to configmaps only
---
# RoleBinding — attach role to service account
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jira-mcp-rolebinding
  namespace: mcp-apps
subjects:
  - kind: ServiceAccount
    name: jira-mcp-sa
    namespace: mcp-apps
roleRef:
  kind: Role
  name: jira-mcp-role
  apiGroup: rbac.authorization.k8s.io